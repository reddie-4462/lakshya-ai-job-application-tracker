# ─── Active Profile ────────────────────────────────────────────────────────────
# Automatically selects the correct environment profile.
#
# ▸ Running locally (IDE / mvn spring-boot:run / java -jar):
#     No env var needed — falls back to "local" automatically.
#     This loads application-local.properties  →  mongodb://localhost:27017/jobtracker
#
# ▸ Running inside Docker (via docker-compose):
#     docker-compose.yml already sets SPRING_PROFILES_ACTIVE=docker.
#     This loads application-docker.properties →  mongodb://localhost:27017/jobtracker
#
# NOTE: The SPRING_PROFILES_ACTIVE environment variable always takes priority
#       over this default value.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ─── File Upload ──────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── Jackson ──────────────────────────────────────────────────────────────────
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.org.springframework.web=INFO
logging.level.com.jfs.tracker=DEBUG

# ─── MongoDB Configuration ────────────────────────────────────────────────────
spring.data.mongodb.uri=mongodb://localhost:27017/jobtracker

# ─── Ollama Configuration ─────────────────────────────────────────────────────
ollama.api.url=http://localhost:11434/api/generate
ollama.model=gemma3:1b

# ─── Application Name ─────────────────────────────────────────────────────────
spring.application.name=lakshya
